name: Dependency Security Audit

on:
  push:
    paths:
      - requirements.txt
  pull_request:
    paths:
      - requirements.txt
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch newly disclosed CVEs
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run pip-audit (isolated venv)
        run: |
          python -m venv .audit-env
          .audit-env/bin/pip install --quiet pip-audit
          .audit-env/bin/pip-audit -r requirements.txt --strict
